<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – ArtBazaar</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { background: var(--cream-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-wrap { display: grid; grid-template-columns: 1fr 1fr; min-height: 600px; max-width: 960px; width: 100%; border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-lg); }
    .auth-visual { background: linear-gradient(160deg, var(--terracotta) 0%, var(--terra-dark) 100%); padding: 52px; display: flex; flex-direction: column; justify-content: space-between; }
    .auth-form-side { background: var(--white); padding: 52px 44px; }
    @media (max-width: 700px) { .auth-wrap { grid-template-columns: 1fr; } .auth-visual { display: none; } .auth-form-side { padding: 36px 24px; } }
  </style>
</head>
<body>

<div class="auth-wrap">
  <!-- Visual Side -->
  <div class="auth-visual">
    <a href="../index.html" style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:white;">Art<span style="color:var(--amber);">Bazaar</span></a>
    <div>
      <h2 style="color:white;margin-bottom:16px;font-size:2rem;">Welcome Back,<br/>Creator.</h2>
      <p style="color:rgba(255,255,255,0.75);line-height:1.8;margin-bottom:32px;">Sign in to manage your artworks, track orders, or explore new masterpieces.</p>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="display:flex;align-items:center;gap:12px;color:rgba(255,255,255,0.8);font-size:0.9rem;"><span style="font-size:1.2rem;">🎨</span> Artist or Buyer? One account for all.</div>
        <div style="display:flex;align-items:center;gap:12px;color:rgba(255,255,255,0.8);font-size:0.9rem;"><span style="font-size:1.2rem;">🔒</span> Secure JWT authentication.</div>
        <div style="display:flex;align-items:center;gap:12px;color:rgba(255,255,255,0.8);font-size:0.9rem;"><span style="font-size:1.2rem;">✨</span> AI-powered recommendations await.</div>
      </div>
    </div>
    <div style="font-size:0.8rem;color:rgba(255,255,255,0.5);">© 2025 ArtBazaar</div>
  </div>

  <!-- Form Side -->
  <div class="auth-form-side">
    <div style="margin-bottom:36px;">
      <h2 style="margin-bottom:8px;">Sign In</h2>
      <p class="text-muted">Don't have an account? <a href="register.html" style="color:var(--terracotta);font-weight:500;">Create one free</a></p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between;">
          Password
          <a href="#" style="color:var(--terracotta);font-size:0.8rem;">Forgot password?</a>
        </label>
        <div style="position:relative;">
          <input type="password" id="password" class="form-input" placeholder="••••••••" required />
          <button type="button" id="togglePwd" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:1rem;">👁</button>
        </div>
      </div>

      <div id="loginError" style="color:#dc2626;font-size:0.85rem;margin-bottom:16px;display:none;"></div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:20px;" id="loginBtn">
        Sign In
      </button>
    </form>

    <div style="position:relative;text-align:center;margin-bottom:20px;">
      <div style="height:1px;background:var(--border);"></div>
      <span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:0 12px;font-size:0.8rem;color:var(--ink-soft);">Or try a demo</span>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <button class="btn btn-ghost btn-sm" onclick="demoLogin('artist')" style="justify-content:center;">🎨 Artist Demo</button>
      <button class="btn btn-ghost btn-sm" onclick="demoLogin('buyer')"  style="justify-content:center;">🛒 Buyer Demo</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="../js/api.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    const user = Auth.getUser();
    window.location.href = user?.role === 'artist' ? 'artist-dashboard.html' : 'buyer-dashboard.html';
  }

  // Check URL params for prefill (e.g. from register redirect)
  const params = new URLSearchParams(window.location.search);

  document.getElementById('togglePwd').addEventListener('click', function () {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    this.textContent = inp.type === 'password' ? '👁' : '🙈';
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';

    btn.innerHTML = '<span class="spinner"></span> Signing in…';
    btn.disabled = true;

    try {
      const data = await AuthAPI.login({
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      });
      Auth.setToken(data.access_token);
      Auth.setUser(data.user);
      showToast(`Welcome back, ${data.user.full_name}!`, 'success');
      setTimeout(() => {
        window.location.href = data.user.role === 'artist' ? 'artist-dashboard.html' : 'buyer-dashboard.html';
      }, 800);
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    }
  });

  async function demoLogin(role) {
    document.getElementById('email').value    = `demo_${role}@artbazaar.in`;
    document.getElementById('password').value = 'demo1234';
    showToast(`Logging in as ${role} demo…`, 'info');
    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
  }
</script>
</body>
</html>
